<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Référents - Direction Usine</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
    margin: 0;
}

.header {
    background: #2f3e50;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
    border-radius: 10px;
    margin: 20px;
}

.container {
    background: #fff;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
}

.inputs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

select, input {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    width: 160px;
}

button {
    background: #1e73d8;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #155bb5;
}

.delete-btn {
    background: red;
}

.edit-btn {
    background: orange;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #1e73d8;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}
</style>
</head>

<body>

<div class="header">
🏭 Gestion des Référents - Direction Usine
</div>

<div class="container">

<div class="inputs">

<select id="service">
<option value="">Service</option>
<option>Production</option>
<option>Maintenance</option>
<option>Magasin</option>
<option>Méthode</option>
<option>QHSE</option>
<option>Qualité</option>
<option>TPM</option>
<option>Moyens généraux</option>
</select>

<select id="zone">
<option value="">Zone</option>
<option>Préparation</option>
<option>Monobloc</option>
<option>Séchoir</option>
<option>Empilage</option>
<option>Dépilage</option>
<option>Four</option>
<option>Emballage</option>
<option>Toutes les zones</option>
</select>

<select id="poste">
<option value="">Poste</option>
<option>Opérateur</option>
<option>Technicien</option>
<option>Technicien TPM</option>
<option>Agent magasin</option>
<option>Chef d'équipe</option>
<option>Superviseur</option>
<option>Responsable</option>
</select>

<input type="text" id="referent" placeholder="Nom référent">
<input type="text" id="fonction" placeholder="Fonction">

<button onclick="ajouterReferent()">Ajouter</button>

</div>

<table id="table">
<thead>
<tr>
<th>Service</th>
<th>Zone</th>
<th>Poste</th>
<th>Référent</th>
<th>Fonction</th>
<th>Action</th>
</tr>
</thead>

<tbody>
</tbody>
</table>

</div>

<script>
function ajouterReferent() {

let service = document.getElementById("service").value;
let zone = document.getElementById("zone").value;
let poste = document.getElementById("poste").value;
let referent = document.getElementById("referent").value;
let fonction = document.getElementById("fonction").value;

if(service === "" || zone === "" || poste === "" || referent === "" || fonction === "") {
    alert("Remplir tous les champs !");
    return;
}

let table = document.getElementById("table").getElementsByTagName("tbody")[0];

let row = table.insertRow();

row.innerHTML = `
<td>${service}</td>
<td>${zone}</td>
<td>${poste}</td>
<td>${referent}</td>
<td>${fonction}</td>
<td>
<button class="edit-btn" onclick="modifier(this)">Modifier</button>
<button class="delete-btn" onclick="supprimer(this)">Supprimer</button>
</td>
`;

document.getElementById("referent").value = "";
document.getElementById("fonction").value = "";
}

function supprimer(btn) {
let row = btn.parentNode.parentNode;
row.remove();
}

function modifier(btn) {
let row = btn.parentNode.parentNode;

let service = row.cells[0].innerText;
let zone = row.cells[1].innerText;
let poste = row.cells[2].innerText;
let referent = row.cells[3].innerText;
let fonction = row.cells[4].innerText;

// remettre dans le formulaire
document.getElementById("service").value = service;
document.getElementById("zone").value = zone;
document.getElementById("poste").value = poste;
document.getElementById("referent").value = referent;
document.getElementById("fonction").value = fonction;

// supprimer ligne pour modification
row.remove();
}
</script>

</body>
</html>
