<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des Référents</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}

.header {
  background:#2c3e50;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
  border-radius:10px;
  margin:20px;
}

.container {
  width:95%;
  margin:auto;
}

.form {
  background:#f0f0f0;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

label {
  font-size:12px;
  color:#555;
}

input, select {
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
  width:160px;
}

button {
  background:#2e6edc;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:5px;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#2e6edc;
  color:white;
  padding:12px;
}

td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

.deleteBtn {
  background:red;
  color:white;
  padding:5px 10px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
🏭 Gestion des Référents - Direction Usine
</div>

<div class="container">

<div class="form">

<div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">

<div>
<label>Service</label><br>
<select id="service">
<option>Production</option>
<option>Maintenance</option>
<option>Magasin</option>
<option>Méthode</option>
<option>QHSE</option>
</select>
</div>

<div>
<label>Zone</label><br>
<select id="zone">
<option>Préparation</option>
<option>Monobloc</option>
<option>Séchoir</option>
<option>Empilage</option>
<option>Dépilage</option>
<option>Four</option>
<option>Emballage</option>
<option>Toutes les zones</option>
</select>
</div>

<div>
<label>Poste</label><br>
<select id="poste">
<option>Opérateur</option>
<option>Technicien</option>
<option>Technicien TPM</option>
<option>Agent magasin</option>
<option>Chef d'équipe</option>
<option>Superviseur</option>
<option>Responsable</option>
</select>
</div>

<div>
<label>Nom référent</label><br>
<input type="text" id="nom" placeholder="Nom référent">
</div>

<div>
<label>Fonction</label><br>
<input type="text" id="fonction" placeholder="Fonction">
</div>

<div>
<br>
<button onclick="ajouter()">Ajouter</button>
</div>

</div>

</div>

<table>
<thead>
<tr>
<th>Service</th>
<th>Zone</th>
<th>Poste</th>
<th>Référent</th>
<th>Fonction</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

// ⚠️ REMPLACE AVEC TES INFOS FIREBASE
const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// AJOUT
function ajouter(){
  if(!nom.value){
    alert("Veuillez saisir le nom du référent");
    return;
  }

  db.collection("referents").add({
    service: service.value,
    zone: zone.value,
    poste: poste.value,
    nom: nom.value,
    fonction: fonction.value
  });

  nom.value="";
  fonction.value="";
}

// AFFICHAGE TEMPS RÉEL
db.collection("referents").onSnapshot(snapshot=>{
  tableBody.innerHTML="";
  snapshot.forEach(doc=>{
    const d = doc.data();

    tableBody.innerHTML += `
    <tr>
      <td>${d.service}</td>
      <td>${d.zone}</td>
      <td>${d.poste}</td>
      <td>${d.nom}</td>
      <td>${d.fonction}</td>
      <td><button class="deleteBtn" onclick="supprimer('${doc.id}')">Supprimer</button></td>
    </tr>`;
  });
});

// SUPPRESSION
function supprimer(id){
  if(confirm("Supprimer ce référent ?")){
    db.collection("referents").doc(id).delete();
  }
}

</script>

</body>
</html>
